<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authorization - Accessible Vision Society</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <img src="../images/logo.jpg" alt="Accessible Vision Society Logo" class="header-logo">
        <h1>Accessible Vision Society</h1>
        <p id="tagline"><q>Admin Portal</q></p>
    </header>

    <main id="main-content">
        <section class="form-container">
            <h2 id="authTitle">Admin Authorization</h2>
            <p id="authDesc">Please provide credentials to access the admin panel.</p>
            
            <form id="authForm" class="accessible-form">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Security Code</label>
                    <input type="password" id="password" required placeholder="Enter security code">
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn-primary">Authorize</button>
                    <a href="announcements.html" class="btn-secondary" style="text-decoration: none; text-align: center;">Back to Announcements</a>
                </div>
            </form>
            <p id="authMessage" style="margin-top: 1rem;"></p>
        </section>
    </main>

    <footer style="background-color: var(--bg-dark); color: var(--text-light); text-align: center; padding: 3rem 1.5rem; margin-top: 4rem;">
        <p class="developer-credit">Developed and maintained by <strong>Pawan Kumar</strong></p>
        <p class="copyright" style="opacity: 0.6; font-size: 0.9rem;">© 2026–<script>document.write(new Date().getFullYear());</script> Accessible Vision Society. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../firebase.js"></script>
    <script>
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authMessage = document.getElementById('authMessage');

        // Redirect if already authorized
        if (typeof auth !== 'undefined' && auth) {
            auth.onAuthStateChanged(user => {
                if (user) {
                    window.location.href = 'announcement-maker.html';
                }
            });
        }

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                authMessage.style.color = 'red';
                authMessage.textContent = "Please enter both credentials.";
                return;
            }

            authMessage.style.color = 'blue';
            authMessage.textContent = "Authorizing...";

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'announcement-maker.html';
                })
                .catch(error => {
                    authMessage.style.color = 'red';
                    authMessage.textContent = "Authorization failed: " + error.message;
                });
        });
    </script>
</body>
</html>
